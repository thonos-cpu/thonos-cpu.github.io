name: deploy-vercel-production

on:
  workflow_run:
    workflows: [quality]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Pull encrypted Vercel production configuration
        run: npx --yes vercel@50.28.0 pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build the production artifact
        run: npx --yes vercel@50.28.0 build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy the verified artifact
        id: deploy
        shell: bash
        run: |
          url=$(npx --yes vercel@50.28.0 deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "### Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"

      - name: Inspect production deployment
        run: npx --yes vercel@50.28.0 inspect ${{ steps.deploy.outputs.url }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Enforce Vercel Firewall baseline
        run: node scripts/configure-vercel-firewall.mjs
