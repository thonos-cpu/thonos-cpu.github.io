name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Rebuild daily so the live GitHub data (repos, stars, READMEs) stays fresh
  # without anyone pushing a commit.
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          # Authenticated GitHub API → ~5000 req/h instead of 60.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: 'true'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
